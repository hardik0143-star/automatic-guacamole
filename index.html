<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tiny Tiffin — Healthy tiffins for happy kids</title>
<meta name="description" content="Find quick, healthy Indian & continental vegetarian tiffin ideas for kids, filtered by age, time, diet and nutrition goals.">
<meta name="theme-color" content="#2B4E32">
<meta property="og:title" content="Tiny Tiffin">
<meta property="og:description" content="Healthy tiffins. Happy kids. Stress-free mornings.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
<script>
  /* Apply saved theme before paint to avoid a light-mode flash */
  try {
    var t = JSON.parse(localStorage.getItem("tt_theme") || '"light"');
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
</script>
</head>
<body>
<div id="app">
  <noscript>Tiny Tiffin needs JavaScript enabled to show recipes.</noscript>
</div>

<script src="data/recipes.js"></script>
<script src="data/i18n.js"></script>
<script src="data/site-config.js"></script>
<script src="data/store.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
